version: "3.9"

services:
  api:
    image: python:3.11-slim
    container_name: hyperliquid_api
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python api_server.py"
    volumes:
      - ./:/app
      - ./state:/app/state
      - ./logs:/app/logs
    expose:
      - "5000"
    restart: unless-stopped

  bot:
    image: python:3.11-slim
    container_name: hyperliquid_bot
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python hyperliquid_bot_executable_orders.py"
    volumes:
      - ./:/app
      - ./state:/app/state
      - ./logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: hyperliquid_frontend
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "npm install &&
             npm run build &&
             npm run preview -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./:/app
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: hyperliquid_nginx
    depends_on:
      - api
      - frontend
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    restart: unless-stopped